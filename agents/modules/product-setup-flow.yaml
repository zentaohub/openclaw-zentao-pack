display_name: ZenTao Product Setup Flow Module
short_description: Create products and initialize product modules through verified ZenTao web forms with strict module constraints.
default_prompt: Use the product-setup-flow module inside openclaw-zentao-pack. Create the product first, then initialize product modules. Enforce product-module constraints before submit: module names in one request must be unique, existing product modules must not be resubmitted, and unsupported fields such as unavailable product code fields must be reported explicitly. Resolve owners in this order: real account, real ZenTao display name, configured user_aliases. If the user did not explicitly ask for another format, your final reply MUST use the exact 5-field wrapper with 【角色】, 【意图】, 【结果】, 【正文】, and 【后续动作】. Do not replace it with free-form headings such as 产品创建结果 or 校验说明.
