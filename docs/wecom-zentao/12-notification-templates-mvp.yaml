version: 1
description: 禅道企微通知消息模板（MVP 第一版）

defaults:
  msgtype: markdown
  include_detail_link: true
  include_operator: true
  include_time: true
  empty_fallback: '-'

templates:
  story_created:
    title: 需求新建通知
    msgtype: markdown
    content: |
      ### 需求新建通知
      > 标题：{{story.title}}
      > 编号：#{{story.id}}
      > 模块：{{story.module_name}}
      > 优先级：P{{story.pri}}
      > 提出人：{{story.requester_name}}
      > 当前负责人：{{story.assigned_to_name}}
      > 操作人：{{operator.name}}
      > 时间：{{event.time}}
      {{story.summary}}
      [查看详情]({{links.story_detail}})

  story_core_field_changed:
    title: 需求核心信息变更
    msgtype: markdown
    content: |
      ### 需求核心信息变更
      > 标题：{{story.title}}
      > 编号：#{{story.id}}
      > 变更字段：{{change.changed_fields_text}}
      > 当前负责人：{{story.assigned_to_name}}
      > 操作人：{{operator.name}}
      > 时间：{{event.time}}
      > 说明：需求核心字段已更新，请及时确认是否影响排期、范围或验收标准。
      [查看详情]({{links.story_detail}})

  story_status_planned:
    title: 需求状态更新
    msgtype: markdown
    content: |
      ### 需求状态更新
      > 标题：{{story.title}}
      > 编号：#{{story.id}}
      > 状态：{{change.old_status_name}} → {{change.new_status_name}}
      > 当前负责人：{{story.assigned_to_name}}
      > 操作人：{{operator.name}}
      > 时间：{{event.time}}
      [查看详情]({{links.story_detail}})

  story_rejected_closed:
    title: 需求关闭/拒绝通知
    msgtype: markdown
    content: |
      ### 需求关闭/拒绝通知
      > 标题：{{story.title}}
      > 编号：#{{story.id}}
      > 状态：{{change.old_status_name}} → {{change.new_status_name}}
      > 当前负责人：{{story.assigned_to_name}}
      > 操作人：{{operator.name}}
      > 时间：{{event.time}}
      > 原因：{{change.reason}}
      [查看详情]({{links.story_detail}})

  story_priority_changed:
    title: 需求优先级变更
    msgtype: markdown
    content: |
      ### 需求优先级变更
      > 标题：{{story.title}}
      > 编号：#{{story.id}}
      > 优先级：P{{change.old_priority}} → P{{change.new_priority}}
      > 当前负责人：{{story.assigned_to_name}}
      > 操作人：{{operator.name}}
      > 时间：{{event.time}}
      > 说明：请确认是否影响当前排期与资源安排。
      [查看详情]({{links.story_detail}})

  story_assignee_changed:
    title: 需求负责人变更
    msgtype: markdown
    content: |
      ### 需求负责人变更
      > 标题：{{story.title}}
      > 编号：#{{story.id}}
      > 负责人：{{change.old_assignee_name}} → {{change.new_assignee_name}}
      > 操作人：{{operator.name}}
      > 时间：{{event.time}}
      [查看详情]({{links.story_detail}})

  story_plan_changed:
    title: 需求计划变更
    msgtype: markdown
    content: |
      ### 需求计划变更
      > 标题：{{story.title}}
      > 编号：#{{story.id}}
      > 变更字段：{{change.changed_fields_text}}
      > 当前负责人：{{story.assigned_to_name}}
      > 操作人：{{operator.name}}
      > 时间：{{event.time}}
      > 说明：请确认是否影响版本上线时间或交付承诺。
      [查看详情]({{links.story_detail}})

  story_done:
    title: 需求完成通知
    msgtype: markdown
    content: |
      ### 需求完成通知
      > 标题：{{story.title}}
      > 编号：#{{story.id}}
      > 状态：{{change.old_status_name}} → {{change.new_status_name}}
      > 当前负责人：{{story.assigned_to_name}}
      > 验证人：{{story.tester_name}}
      > 操作人：{{operator.name}}
      > 时间：{{event.time}}
      [查看详情]({{links.story_detail}})

  bug_created_high:
