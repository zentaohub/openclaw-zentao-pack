      > 编号：#{{bug.id}}
      > 严重程度：S{{bug.severity}}
      > 优先级：P{{bug.pri}}
      > 当前负责人：{{bug.assigned_to_name}}
      > 提出人：{{bug.opened_by_name}}
      > 操作人：{{operator.name}}
      > 时间：{{event.time}}
      > 说明：该 Bug 已达到高优先级，请优先处理。
      [查看详情]({{links.bug_detail}})

  bug_created_normal:
