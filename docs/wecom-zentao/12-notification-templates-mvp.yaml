      > 严重程度：S{{bug.severity}}
      > 优先级：P{{bug.pri}}
      > 当前负责人：{{bug.assigned_to_name}}
      > 提出人：{{bug.opened_by_name}}
      > 操作人：{{operator.name}}
      > 时间：{{event.time}}
