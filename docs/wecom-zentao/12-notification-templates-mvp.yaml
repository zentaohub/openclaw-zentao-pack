      > 编号：#{{bug.id}}
      > 关联需求：{{story.title}}
      > 需求编号：#{{story.id}}
      > 当前负责人：{{bug.assigned_to_name}}
      > 操作人：{{operator.name}}
      > 时间：{{event.time}}
