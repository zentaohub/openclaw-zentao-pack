version: 1
description: 禅道企微通知模板卡片（MVP 第一版，对应 12-notification-templates-mvp.yaml）

defaults:
  msgtype: template_card
  card_type: text_notice
  source:
    desc: OpenClaw禅道助手
    desc_color: 0
  enable_id_trans: 0
  enable_duplicate_check: 0
  duplicate_check_interval: 1800

templates:
  story_created:
    title: 需求新建通知
    msgtype: template_card
    template_card:
      card_type: text_notice
      source:
        desc: OpenClaw禅道助手
        desc_color: 0
      main_title:
        title: 需求新建通知
        desc: '{{story.title}}'
      sub_title_text: '{{story.summary}}'
      horizontal_content_list:
        - keyname: 编号
          value: '#{{story.id}}'
        - keyname: 模块
          value: '{{story.module_name}}'
        - keyname: 优先级
          value: 'P{{story.pri}}'
        - keyname: 提出人
          value: '{{story.requester_name}}'
        - keyname: 负责人
          value: '{{story.assigned_to_name}}'
        - keyname: 操作人
          value: '{{operator.name}}'
      jump_list:
        - type: 1
          title: 查看详情
          url: '{{links.story_detail}}'
      card_action:
        type: 1
        url: '{{links.story_detail}}'

  story_core_field_changed:
